<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso — Sistema de Reportes Operativos</title>
<style>
  :root {
    --bg:       #0b0f1a;
    --surface:  #111827;
    --surface2: #1a2235;
    --border:   rgba(255,255,255,0.08);
    --accent:   #3b82f6;
    --accent2:  #6366f1;
    --text:     #f1f5f9;
    --muted:    #94a3b8;
    --danger:   #ef4444;
    --success:  #22c55e;
    --radius:   14px;
    --font:     'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    position: relative;
    overflow: hidden;
  }

  /* Fondo con patrón de red de transporte */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(59,130,246,0.07) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(99,102,241,0.07) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Líneas de ruta animadas */
  .bg-lines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 420px;
    padding: 44px 40px 40px;
    position: relative;
    z-index: 1;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .brand-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .brand-icon svg { width: 22px; height: 22px; fill: white; }

  .brand-text h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .brand-text p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    stroke: var(--muted);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }

  .input-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 12px 14px 12px 42px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }

  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--muted);
    display: flex;
    align-items: center;
  }

  .toggle-pw svg {
    position: static;
    transform: none;
    width: 16px;
    height: 16px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 10px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    padding: 13px;
    cursor: pointer;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity .2s, transform .1s;
    position: relative;
    overflow: hidden;
  }

  .btn-login:hover { opacity: .92; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .alert {
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    margin-top: 14px;
    display: none;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.4;
  }

  .alert-error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    color: #fca5a5;
  }

  .alert-warn {
    background: rgba(251,191,36,0.1);
    border: 1px solid rgba(251,191,36,0.25);
    color: #fcd34d;
  }

  .alert svg {
    width: 16px; height: 16px;
    flex-shrink: 0;
    margin-top: 1px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  .badge-rol {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(59,130,246,0.12);
    border: 1px solid rgba(59,130,246,0.25);
    color: #93c5fd;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: inline-flex;
  }
</style>
</head>
<body>

<svg class="bg-lines" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <line x1="0" y1="200" x2="1440" y2="400" stroke="white" stroke-width="1"/>
  <line x1="0" y1="500" x2="1440" y2="200" stroke="white" stroke-width="1"/>
  <line x1="200" y1="0" x2="400" y2="900" stroke="white" stroke-width="1"/>
  <line x1="900" y1="0" x2="700" y2="900" stroke="white" stroke-width="1"/>
  <circle cx="350" cy="300" r="4" fill="white"/>
  <circle cx="700" cy="450" r="4" fill="white"/>
  <circle cx="1100" cy="250" r="4" fill="white"/>
</svg>

<div class="card">

  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24">
        <path d="M8 6v6l4 2 4-2V6M4 3h16a1 1 0 011 1v16a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1z"/>
      </svg>
    </div>
    <div class="brand-text">
      <h1>Centro de Control</h1>
      <p>Reportes Operativos</p>
    </div>
  </div>

  <span class="badge-rol">
    <svg style="width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;" viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
    Solo Coordinadores
  </span>

  <h2>Bienvenido</h2>
  <p class="subtitle">Ingresa tus credenciales para acceder al formulario diario de reporte.</p>

  <div class="field">
    <label>Clave de acceso</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <input type="text" id="clave" placeholder="Ej: COORD01" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <div class="field">
    <label>Contraseña</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <button class="toggle-pw" type="button" onclick="togglePw()" id="eyeBtn" title="Mostrar/ocultar">
        <svg id="eyeIcon" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="btn-login" id="btnLogin" onclick="doLogin()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">Ingresar al sistema</span>
    <svg style="width:16px;height:16px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;" id="btnIcon" viewBox="0 0 24 24">
      <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
    </svg>
  </button>

  <div class="alert alert-error" id="alertError">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="alertText"></span>
  </div>

  <div class="alert alert-warn" id="alertWarn">
    <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span id="warnText"></span>
  </div>

  <div class="divider"></div>
  <p class="footer-note">Sistema interno de gestión operativa.<br>Acceso restringido a personal autorizado.</p>
</div>

<script>
const API_USERS = 'https://script.google.com/macros/s/AKfycbzt059aIGqjtv5s5oIDksB2LliIwtl9HqWfz-XF5M13e1XYStSfdQQ-xjpGbdlrW6s5/exec';

let pwVisible = false;

function togglePw() {
  pwVisible = !pwVisible;
  const inp = document.getElementById('password');
  inp.type = pwVisible ? 'text' : 'password';
  document.getElementById('eyeIcon').innerHTML = pwVisible
    ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}

function showError(msg) {
  document.getElementById('alertError').style.display = 'flex';
  document.getElementById('alertText').textContent = msg;
  document.getElementById('alertWarn').style.display = 'none';
}

function showWarn(msg) {
  document.getElementById('alertWarn').style.display = 'flex';
  document.getElementById('warnText').textContent = msg;
  document.getElementById('alertError').style.display = 'none';
}

function clearAlerts() {
  document.getElementById('alertError').style.display = 'none';
  document.getElementById('alertWarn').style.display = 'none';
}

function setLoading(on) {
  const btn = document.getElementById('btnLogin');
  btn.disabled = on;
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btnText').textContent = on ? 'Verificando...' : 'Ingresar al sistema';
  document.getElementById('btnIcon').style.display = on ? 'none' : 'block';
}

async function doLogin() {
  const clave = document.getElementById('clave').value.trim();
  const pass  = document.getElementById('password').value;
  clearAlerts();

  if (!clave || !pass) { showError('Por favor completa todos los campos.'); return; }

  setLoading(true);

  try {
    const url  = `${API_USERS}?clave=${encodeURIComponent(clave)}&password=${encodeURIComponent(pass)}`;
    const resp = await fetch(url);
    const data = await resp.json();

    // La API devuelve un objeto con campos: clave, nombre, rol, base, password, activo
    if (!data || data.error || !data.clave) {
      showError('Credenciales incorrectas. Verifica tu clave y contraseña.');
      setLoading(false);
      return;
    }

    if (data.activo === false || data.activo === 'false' || data.activo === 0) {
      showWarn('Tu cuenta está inactiva. Contacta al administrador.');
      setLoading(false);
      return;
    }

    const rol = (data.rol || '').toLowerCase().trim();

    if (rol !== 'coordinador') {
      showWarn(`Tu rol (${data.rol}) no tiene acceso a este módulo. Solo coordinadores pueden ingresar.`);
      setLoading(false);
      return;
    }

    // Guardar sesión
    sessionStorage.setItem('user', JSON.stringify({
      clave:  data.clave,
      nombre: data.nombre,
      rol:    data.rol,
      base:   data.base
    }));

    // Redirigir
    window.location.href = 'index.html';

  } catch (err) {
    showError('Error de conexión. Intenta de nuevo en un momento.');
    setLoading(false);
  }
}

// Enter key
['clave','password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

// Si ya hay sesión activa
if (sessionStorage.getItem('user')) {
  try {
    const u = JSON.parse(sessionStorage.getItem('user'));
    if (u && (u.rol||'').toLowerCase() === 'coordinador') {
      window.location.href = 'index.html';
    }
  } catch(_) {}
}
</script>
</body>
</html>
