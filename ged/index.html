<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control GED — Bitácora Evidencias Digitales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #1a1e28;
  --bg4: #222736;
  --border: #2a2f3d;
  --border2: #353c50;
  --accent: #00d4aa;
  --accent2: #0099ff;
  --accent3: #ff6b35;
  --warn: #f59e0b;
  --danger: #ef4444;
  --success: #10b981;
  --text1: #f0f2f7;
  --text2: #a8b0c4;
  --text3: #606880;
  --mono: 'IBM Plex Mono', monospace;
  --head: 'Syne', sans-serif;
  --body: 'Inter', sans-serif;
  --radius: 8px;
  --radius-lg: 14px;
  --sidebar-w: 240px;
  --header-h: 60px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text1);
  min-height: 100vh;
  display: flex;
  font-size: 14px;
  line-height: 1.5;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  z-index: 100;
  transition: transform 0.3s;
}
.sidebar-logo {
  padding: 18px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--head);
  font-weight: 800;
  font-size: 14px;
  color: #000;
  flex-shrink: 0;
}
.logo-text { font-family: var(--head); font-size: 13px; font-weight: 700; color: var(--text1); line-height: 1.2; }
.logo-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); }

.sidebar-section { padding: 12px 0; }
.sidebar-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 6px 20px 4px;
  font-family: var(--mono);
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  color: var(--text2);
  font-size: 13px;
  font-weight: 400;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  position: relative;
}
.nav-item:hover { background: var(--bg3); color: var(--text1); }
.nav-item.active { background: rgba(0,212,170,0.08); color: var(--accent); border-left-color: var(--accent); }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }
.nav-badge {
  margin-left: auto;
  font-size: 10px;
  font-family: var(--mono);
  background: var(--accent3);
  color: #fff;
  padding: 1px 6px;
  border-radius: 10px;
}

.sidebar-footer {
  margin-top: auto;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
}
.conn-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--success);
  margin-right: 6px;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* MAIN */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
.topbar {
  height: var(--header-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title {
  font-family: var(--head);
  font-size: 18px;
  font-weight: 700;
  color: var(--text1);
  flex: 1;
}
.topbar-folio {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: rgba(0,212,170,0.08);
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid rgba(0,212,170,0.2);
}
.topbar-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text1);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.topbar-btn:hover { border-color: var(--accent); color: var(--accent); }
.topbar-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.topbar-btn.primary:hover { background: #00b894; }

/* CONTENT */
.content { padding: 28px; flex: 1; }

/* DASHBOARD */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}
.stat-card:hover { border-color: var(--border2); }
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--card-accent, var(--accent));
}
.stat-label { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 8px; }
.stat-num { font-family: var(--head); font-size: 32px; font-weight: 800; color: var(--text1); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.stat-icon {
  position: absolute;
  top: 16px; right: 16px;
  width: 28px; height: 28px;
  opacity: 0.15;
}

.dash-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 18px;
}

/* CARDS */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.card-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-title {
  font-family: var(--head);
  font-size: 14px;
  font-weight: 700;
  color: var(--text1);
  flex: 1;
}
.card-body { padding: 0; }

/* TABLE */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.data-table th {
  padding: 10px 16px;
  text-align: left;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.data-table td {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
  vertical-align: middle;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg3); color: var(--text1); }
.data-table .folio-cell {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
}

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
  font-family: var(--mono);
  white-space: nowrap;
}
.badge-success { background: rgba(16,185,129,0.12); color: #34d399; }
.badge-warning { background: rgba(245,158,11,0.12); color: #fbbf24; }
.badge-danger { background: rgba(239,68,68,0.12); color: #f87171; }
.badge-info { background: rgba(0,153,255,0.12); color: #60a5fa; }
.badge-neutral { background: rgba(255,255,255,0.06); color: var(--text2); }
.badge-orange { background: rgba(255,107,53,0.12); color: #fb8a5e; }

/* FORMS */
.form-page { max-width: 900px; }
.form-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 18px;
  overflow: hidden;
}
.form-section-header {
  padding: 14px 20px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.form-section-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.form-section-title {
  font-family: var(--head);
  font-size: 13px;
  font-weight: 700;
  color: var(--text1);
}
.form-section-sub { font-size: 11px; color: var(--text3); margin-left: auto; font-family: var(--mono); }
.form-body { padding: 20px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.form-full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  font-family: var(--mono);
  letter-spacing: 0.03em;
}
.form-label .req { color: var(--danger); margin-left: 2px; }
.form-control {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text1);
  font-family: var(--body);
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
.form-control:focus { border-color: var(--accent); }
.form-control::placeholder { color: var(--text3); }
select.form-control { cursor: pointer; }
textarea.form-control { resize: vertical; min-height: 80px; }
.folio-display {
  background: var(--bg);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  padding: 9px 12px;
  letter-spacing: 0.05em;
}
.toggle-group { display: flex; gap: 8px; }
.toggle-btn {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg3);
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.toggle-btn.selected { border-color: var(--accent); background: rgba(0,212,170,0.1); color: var(--accent); }
.toggle-btn.selected-no { border-color: var(--danger); background: rgba(239,68,68,0.1); color: var(--danger); }

/* TRANSFER TABLE */
.transfer-table-wrap { overflow-x: auto; margin-top: 12px; }
.transfer-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.transfer-table th {
  background: var(--bg3);
  padding: 8px 10px;
  text-align: left;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  border: 1px solid var(--border);
}
.transfer-table td {
  padding: 6px 10px;
  border: 1px solid var(--border);
}
.transfer-table input, .transfer-table select {
  background: transparent;
  border: none;
  color: var(--text1);
  font-size: 12px;
  width: 100%;
  outline: none;
  font-family: var(--body);
}
.transfer-table input:focus, .transfer-table select:focus { color: var(--accent); }
.add-row-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.15s;
}
.add-row-btn:hover { border-color: var(--accent); color: var(--accent); }
.del-row { color: var(--danger); cursor: pointer; padding: 0 4px; opacity: 0.6; }
.del-row:hover { opacity: 1; }

/* FORM ACTIONS */
.form-actions {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 20px 0 0;
}
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
.btn-primary:hover { background: #00b894; }
.btn-secondary { background: var(--bg3); border-color: var(--border2); color: var(--text1); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: var(--danger); }
.btn-danger:hover { background: rgba(239,68,68,0.2); }
.save-msg {
  font-size: 12px;
  font-family: var(--mono);
  padding: 7px 14px;
  border-radius: var(--radius);
  display: none;
}
.save-msg.ok { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
.save-msg.err { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }

/* LIST VIEW */
.list-toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.search-input {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text1);
  font-size: 13px;
  padding: 8px 14px;
  outline: none;
  min-width: 220px;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent); }
.filter-select {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text2);
  font-size: 12px;
  padding: 8px 12px;
  outline: none;
  cursor: pointer;
}

/* CHARTS */
.chart-bar { display: flex; flex-direction: column; gap: 6px; padding: 16px 20px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 11px; color: var(--text2); width: 110px; flex-shrink: 0; font-family: var(--mono); }
.bar-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.6s ease; }
.bar-count { font-size: 11px; color: var(--text3); font-family: var(--mono); width: 28px; text-align: right; }

/* PRIORITY DOTS */
.prio { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }
.prio::before {
  content: ''; display: inline-block;
  width: 6px; height: 6px; border-radius: 50%;
}
.prio-alta::before { background: var(--danger); }
.prio-media::before { background: var(--warn); }
.prio-baja::before { background: var(--success); }

/* EMPTY STATE */
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--text3);
}
.empty-state svg { width: 48px; height: 48px; opacity: 0.3; margin: 0 auto 12px; display: block; }
.empty-state h3 { font-family: var(--head); font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.empty-state p { font-size: 12px; }

/* TOAST */
#toast {
  position: fixed;
  bottom: 28px; right: 28px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 14px 20px;
  font-size: 13px;
  color: var(--text1);
  z-index: 9999;
  transform: translateY(20px);
  opacity: 0;
  transition: all 0.25s;
  max-width: 320px;
  display: flex;
  align-items: center;
  gap: 10px;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.success { border-color: rgba(16,185,129,0.3); }
#toast.error { border-color: rgba(239,68,68,0.3); }

/* CONFIG PANEL */
.config-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
.config-section h3 { font-family: var(--head); font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.config-section p { font-size: 12px; color: var(--text2); margin-bottom: 14px; }
.url-input { font-family: var(--mono); font-size: 12px; }

/* PROGRESS */
.progress-steps {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  overflow: hidden;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
}
.progress-step {
  flex: 1;
  padding: 12px 16px;
  text-align: center;
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
}
.progress-step:last-child { border-right: none; }
.progress-step.active { background: rgba(0,212,170,0.08); color: var(--accent); }
.progress-step.done { background: rgba(16,185,129,0.05); color: var(--success); }

/* RISK METER */
.risk-indicator {
  display: flex;
  gap: 3px;
  align-items: center;
}
.risk-bar { width: 4px; height: 14px; border-radius: 2px; background: var(--border); }
.risk-bar.active-low { background: var(--success); }
.risk-bar.active-med { background: var(--warn); }
.risk-bar.active-high { background: var(--danger); }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .dash-grid { grid-template-columns: 1fr; }
  .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
}
</style>
</head>

<div id="toast"></div>

<script>
// ============================================================
// AUTHENTICATION
// ============================================================
const loggedUserRaw = sessionStorage.getItem('loggedUser');
if (!loggedUserRaw) {
  window.location.href = 'login.html';
}
const LOGGED_USER = JSON.parse(loggedUserRaw);

// ============================================================
// STATE
// ============================================================
const GED_API_URL = 'https://script.google.com/macros/s/AKfycbxPfjNNuuiPAtK85SVo9XTk7iEWTJV3ie9nhCbiLfK0YgmqLX_iI7XKHUc6qGyTbw8Q/exec';
const USERS_API_URL = 'https://script.google.com/macros/s/AKfycbzt059aIGqjtv5s5oIDksB2LliIwtl9HqWfz-XF5M13e1XYStSfdQQ-xjpGbdlrW6s5/exec';

const STATE = {
  apiUrl: GED_API_URL,
  currentPage: 'dashboard',
  data: {
    solicitudes: [],
    incidencias: [],
    prestamos: [],
    extracciones: []
  },
  dashboard: null,
  usuarios: [],
  transferRows: [],
  currentFolio: null
};

// ============================================================
// FOLIO GENERATOR (client-side)
// ============================================================
function generateFolio(prefix = 'GED') {
  const now = new Date();
  const yy = String(now.getFullYear()).slice(-2);
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const seq = String(Math.floor(Math.random() * 9000) + 1000);
  return `${prefix}-${yy}${mm}-${seq}`;
}

function todayDate() {
  return new Date().toISOString().slice(0, 10);
}
function nowTime() {
  return new Date().toTimeString().slice(0, 5);
}

// ============================================================
// API CALLS
// ============================================================
async function usuariosApiCall(action, params = {}) {
  const url = new URL(USERS_API_URL);
  url.searchParams.set('accion', action);
  Object.entries(params).forEach(([key, value]) => {
    if (value !== undefined && value !== null) url.searchParams.set(key, value);
  });
  try {
    const res = await fetch(url.toString());
    return await res.json();
  } catch (e) {
    toast('Error consultando usuarios: ' + e.message, 'error');
    return null;
  }
}

async function apiCall(action, payload = {}) {
  try {
    const res = await fetch(STATE.apiUrl, {
      method: 'POST',
      body: JSON.stringify({ action, ...payload })
    });
    return await res.json();
  } catch (e) {
    toast('Error de conexión: ' + e.message, 'error');
    return null;
  }
}

// ============================================================
// TOAST
// ============================================================
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  const icons = { info: '💬', success: '✅', error: '❌', warn: '⚠️' };
  el.innerHTML = `<span>${icons[type] || '💬'}</span><span>${msg}</span>`;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3000);
}

// ============================================================
// NAVIGATION
// ============================================================
function showPage(page) {
  STATE.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  const titles = {
    dashboard: 'Dashboard',
    'solicitudes-new': 'Nueva Solicitud de Evidencia Digital',
    'solicitudes-list': 'Consulta de Solicitudes',
    'cadena-new': 'Cadena de Custodia',
    'comparticion-new': 'Registro de Compartición'
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  const folio = document.getElementById('topbar-folio');
  folio.style.display = 'none';
  renderPage(page);
}

// ============================================================
// PAGE ROUTER
// ============================================================
function renderPage(page) {
  const c = document.getElementById('content');
  switch (page) {
    case 'dashboard': c.innerHTML = renderDashboard(); loadDashboard(); break;
    case 'solicitudes-new': c.innerHTML = renderSolicitudForm(); initFormDefaults(); break;
    case 'solicitudes-list': c.innerHTML = renderSolicitudesList(); loadSolicitudes(); break;
    case 'cadena-new': c.innerHTML = renderCadenaForm(); initCadenaDefaults(); break;
    case 'comparticion-new': c.innerHTML = renderComparticionForm(); break;
    default: c.innerHTML = '<p>Página no encontrada</p>';
  }
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  return `

  <div class="stats-grid" id="stats-grid">
    ${statCard('Total Solicitudes', '—', 'var(--accent)', 'solicitudes registradas')}

    <div class="card">

        </div>
      </div>
    </div>
  </div>`;
}

function statCard(label, val, color, sub) {
  return `<div class="stat-card" style="--card-accent:${color}">
    <div class="stat-label">${label}</div>
    <div class="stat-num" style="color:${color}">${val}</div>
    <div class="stat-sub">${sub}</div>
  </div>`;
}

async function loadDashboard() {
  const d = await apiCall('getDashboard');
  if (!d) return;
  STATE.dashboard = d;
  const nums = document.querySelectorAll('.stat-num');
  if (nums[0]) nums[0].textContent = d.totalSolicitudes || 0;
  if (nums[1]) nums[1].textContent = d.solicitudesPendientes || 0;
  if (nums[2]) nums[2].textContent = d.solicitudesRecuperadas || 0;
  if (nums[3]) nums[3].textContent = d.solicitudesSinVideo || 0;
  // Table
  const tb = document.querySelector('#dash-solicitudes tbody');
  if (d.ultimasSolicitudes && d.ultimasSolicitudes.length) {
    tb.innerHTML = d.ultimasSolicitudes.map(r => `<tr>
      <td class="folio-cell">${r['Folio GED'] || '—'}</td>
      <td>${r['Unidad'] || '—'}</td>
      <td>${r['Tipo Evento'] || '—'}</td>
      <td>${prioBadge(r['Prioridad'])}</td>
      <td>${resultBadge(r['Resultado'])}</td>
    </tr>`).join('');
  } else {
    tb.innerHTML = `<tr><td colspan="5" class="empty-state" style="padding:24px;text-align:center;color:var(--text3)">Sin registros recientes</td></tr>`;
  }
  // Charts
  renderBarChart('chart-fallas', d.tiposEventoCount || {}, 'var(--accent3)');
  renderBarChart('chart-resultados', d.resultadosCount || {}, 'var(--accent2)');
}

function renderBarChart(id, obj, color) {
  const el = document.getElementById(id);
  if (!el) return;
  const entries = Object.entries(obj).sort((a, b) => b[1] - a[1]);
  if (!entries.length) { el.innerHTML = '<p style="font-size:12px;color:var(--text3);text-align:center;padding:20px">Sin datos</p>'; return; }
  const max = Math.max(...entries.map(e => e[1]));
  el.innerHTML = entries.slice(0, 8).map(([k, v]) => `
    <div class="bar-row">
      <div class="bar-label" title="${k}">${k.length > 14 ? k.slice(0, 14) + '…' : k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%;background:${color}"></div></div>
      <div class="bar-count">${v}</div>
    </div>`).join('');
}

function opts(arr) {
  return arr.map(v => `<option value="${v}">${v}</option>`).join('');
}

function toggleSolicitudOther(selectId, wrapId) {
  const shouldShow = getVal(selectId) === 'Otro';
  const wrap = document.getElementById(wrapId);
  if (wrap) wrap.style.display = shouldShow ? '' : 'none';
}

function getSolicitudSelectValue(selectId, otherId) {
  const value = getVal(selectId);
  if (value !== 'Otro') return value;
  const other = getVal(otherId).trim();
  return other ? `Otro: ${other}` : '';
}

function getPrioridadPorTipo(tipo) {
  const prioridades = {
    'Accidente con Fallecidos': 'Crítica',
    'Accidente con lesionados': 'Crítica',
    'Eventos mediaticos': 'Crítica',
    'Intervencion de autoridades': 'Crítica',
    'Perdida patrimonial mayor': 'Crítica',
    'Secuestro': 'Crítica',
    'Vandalismo': 'Crítica',
    'Acoso': 'Alta',
    'Asaltos': 'Alta',
    'Choques relevantes': 'Alta',
    'Conducta indebida': 'Alta',
    'Queja de usuario': 'Alta',
    'Rinas': 'Alta',
    'Robos': 'Alta',
    'Violencia familiar': 'Alta',
    'Incidentes lamineros menores': 'Media',
    'Puntualidad': 'Media',
    'Uniforme': 'Media',
    'Validaciones internas': 'Media',
    'Conducta de operador': 'Media',
    'Objetos perdidos y validaciones menores': 'Baja'
  };
  return prioridades[tipo] || '';
}

function updateSolicitudPriority() {
  const prioridad = document.getElementById('f-prioridad');
  if (prioridad) prioridad.value = getPrioridadPorTipo(getVal('f-tipoEvento'));
}



function transferAreaOptions() {
  return `<option value="">— Seleccionar —</option>${opts(['Analisis','Tecnologia a Bordo','Paqueteria','Juridico','Jefe TAB','Gerencia TAB','Direccion TAB'])}`;
}

function nowDateTimeLocal() {
  return `${todayDate()}T${nowTime()}`;
}

function initFormDefaults() {
  const fi = (id, v) => { const el = document.getElementById(id); if (el) el.value = v; };
  fi('f-fechaHoraSolicitud', nowDateTimeLocal());
  fi('f-fechaEvento', todayDate());
  fi('f-fechaHoraAtencion', nowDateTimeLocal());
  updateSolicitudPriority();
  const fd = document.getElementById('topbar-folio');
  fd.textContent = STATE.currentFolio;
  fd.style.display = '';
}

function getVal(id) { const el = document.getElementById(id); return el ? el.value : ''; }

async function saveSolicitud() {
  const folio = STATE.currentFolio || generateFolio('GED');
  const folioSolicitud = getVal('f-folioSolicitud');
  const horaEvento = getVal('f-horaEvento');
  const fechaHoraSolicitud = getVal('f-fechaHoraSolicitud');
  const fechaHoraAtencion = getVal('f-fechaHoraAtencion');
  updateSolicitudPriority();
  const payload = {
    folioGED: folio,
    folioSolicitud,
    folioOrigen: folioSolicitud,
    fechaHoraSolicitud,
    fechaSolicitud: fechaHoraSolicitud ? fechaHoraSolicitud.slice(0, 10) : '',
    horaSolicitud: fechaHoraSolicitud ? fechaHoraSolicitud.slice(11, 16) : '',
    areaSolicitante: getSolicitudSelectValue('f-areaSolicitante', 'f-areaSolicitanteOtro'),
    medioRecepcion: getSolicitudSelectValue('f-medioRecepcion', 'f-medioRecepcionOtro'),
    unidad: getVal('f-unidad'),
    fechaEvento: getVal('f-fechaEvento'),
    horaEvento,
    horaAproximada: horaEvento,
    ubicacion: getVal('f-ubicacion'),
    tipoEvento: getVal('f-tipoEvento'),
    prioridad: getVal('f-prioridad'),
    descripcion: getVal('f-descripcion'),
    auxiliarAsignado: LOGGED_USER.clave,
    fechaHoraAtencion,
    fechaAtencion: fechaHoraAtencion ? fechaHoraAtencion.slice(0, 10) : '',
    horaAtencion: fechaHoraAtencion ? fechaHoraAtencion.slice(11, 16) : '',
    resultado: getVal('f-resultado'),
    observaciones: getVal('f-observaciones')
  };
  if (!payload.areaSolicitante || !payload.folioSolicitud || !payload.medioRecepcion || !payload.fechaHoraSolicitud || !payload.unidad || !payload.fechaEvento || !payload.tipoEvento || !payload.prioridad) {
    toast('Complete los campos obligatorios (*)', 'error'); return;
  }
  if (!/^\d{5}$/.test(payload.unidad)) {
    toast('La unidad debe capturarse a 5 dígitos', 'error'); return;
  }
  const res = await apiCall('saveSolicitud', { payload });
  if (res && res.ok) {
    toast(`Solicitud ${folio} guardada`, 'success');
    showMsg('save-msg', `✅ Folio: ${folio}`, true);
    STATE.currentFolio = generateFolio('GED');
    document.getElementById('folio-display').textContent = STATE.currentFolio;
    document.getElementById('topbar-folio').textContent = STATE.currentFolio;
  } else {
    toast('Error al guardar', 'error');
  }
}

  el.textContent = msg;
  el.className = `save-msg ${ok ? 'ok' : 'err'}`;
  el.style.display = '';
  setTimeout(() => el.style.display = 'none', 4000);
}

function addTransferRow() {
  const id = Date.now();

  const tr = document.createElement('tr');
  tr.id = `tr-${id}`;
  tr.innerHTML = `

    </select></td>
    <td><span class="del-row" onclick="this.closest('tr').remove()">✕</span></td>`;

}

function getTransferRows() {
  const tbody = document.getElementById('transfer-tbody');
  if (!tbody) return [];
  return Array.from(tbody.querySelectorAll('tr')).map(tr => {
    const inputs = tr.querySelectorAll('input, select');
    return {
      fecha: inputs[0]?.value,
      hora: inputs[1]?.value,
      entrega: inputs[2]?.value,
      recibe: inputs[3]?.value,
      area: inputs[4]?.value,
      motivo: inputs[5]?.value,
      condicion: inputs[6]?.value
    };
  });
}

function selectToggle(hiddenId, val, el) {
  document.getElementById(hiddenId).value = val;
  el.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.className = 'toggle-btn');
  el.classList.add(val === 'Sí' ? 'selected' : 'selected-no');
}

async function saveIncidencia() {
  const payload = {
    fecha: getVal('inc-fecha'),
    unidad: getVal('inc-unidad'),
    tipoDVR: getVal('inc-tipoDVR'),
    tipoFalla: getVal('inc-tipoFalla'),
    canalAfectado: getVal('inc-canalAfectado'),
    detectadoPor: getVal('inc-detectadoPor'),
    durante: getVal('inc-durante'),
    reportadoEn: getVal('inc-reportadoEn'),
    folioMeipack: getVal('inc-folioMeipack'),
    criticidad: getVal('inc-criticidad'),
    observaciones: getVal('inc-observaciones')
  };
  if (!payload.unidad || !payload.tipoFalla) { toast('Complete campos obligatorios', 'error'); return; }
  const res = await apiCall('saveIncidencia', { payload });
  if (res && res.ok) {
    toast(`Incidencia ${res.folio} registrada`, 'success');
    showMsg('save-msg-inc', `✅ ${res.folio}`, true);
    const badge = document.getElementById('badge-inc');
    if (badge) badge.textContent = parseInt(badge.textContent || 0) + 1;
  } else { toast('Error al guardar', 'error'); }
}

function renderSolicitudesList() {
  return `
  <div class="list-toolbar">
    <input class="search-input" id="search-sol" placeholder="🔍 Buscar por folio, unidad, área…" oninput="filterSolicitudes()">
    <select class="filter-select" id="filter-resultado" onchange="filterSolicitudes()">

      ${opts(['Con incidencia técnica','Pendiente','Recuperado','Sin video','Sobreescritura'])}
    </select>
    <select class="filter-select" id="filter-prioridad" onchange="filterSolicitudes()">
      <option value="">Todas las prioridades</option>
      ${opts(['Alta','Baja','Crítica','Media'])}
    </select>
    <button class="btn btn-primary" onclick="showPage('solicitudes-new')" style="margin-left:auto">+ Nueva Solicitud</button>
  </div>
  <div class="card">
    <div class="card-header">
      <span class="card-title">Solicitudes de Evidencias Digitales</span>
      <span id="sol-count" style="font-size:12px;color:var(--text3);font-family:var(--mono)">Cargando…</span>
    </div>
    <div class="card-body">
      <table class="data-table" id="sol-table">
        <thead><tr>
          <th>Folio GED</th><th>Folio Solicitud</th><th>Fecha/Hora</th><th>Área</th><th>Unidad</th>
          <th>Tipo Evento</th><th>Prioridad</th><th>Resultado</th><th>Auxiliar</th>
        </tr></thead>
        <tbody id="sol-tbody"><tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text3)">Cargando datos…</td></tr></tbody>
      </table>
    </div>
  </div>`;
}

let allSolicitudes = [];
async function loadSolicitudes() {
  const data = await apiCall('getSolicitudes', { filters: {} });
  if (!data) return;
  allSolicitudes = Array.isArray(data) ? data : [];
  renderSolicitudesTable(allSolicitudes);
}

function renderSolicitudesTable(rows) {
  const tbody = document.getElementById('sol-tbody');
  const count = document.getElementById('sol-count');
  if (!tbody) return;
  if (count) count.textContent = `${rows.length} registros`;
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><h3>Sin registros</h3><p>No se encontraron solicitudes con los filtros aplicados.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => `<tr>
    <td class="folio-cell">${r['Folio GED'] || '—'}</td>
    <td>${r['Folio Solicitud'] || r['Folio Origen'] || '—'}</td>
    <td style="font-size:11px;font-family:var(--mono)">${r['FechaHora Solicitud'] || [r['Fecha Solicitud'], r['Hora Solicitud']].filter(Boolean).join(' ') || '—'}</td>
    <td>${r['Area Solicitante'] || r['Solicitante'] || '—'}</td>
    <td>${r['Unidad'] || '—'}</td>
    <td>${r['Tipo Evento'] || '—'}</td>
    <td>${prioBadge(r['Prioridad'])}</td>
    <td>${resultBadge(r['Resultado'])}</td>
    <td>${r['Auxiliar Asignado'] || '—'}</td>
  </tr>`).join('');
}

function filterSolicitudes() {
  const q = document.getElementById('search-sol')?.value.toLowerCase() || '';
  const res = document.getElementById('filter-resultado')?.value || '';
  const prio = document.getElementById('filter-prioridad')?.value || '';
  const filtered = allSolicitudes.filter(r => {
    const match = !q || Object.values(r).some(v => String(v).toLowerCase().includes(q));
    const matchRes = !res || r['Resultado'] === res;
    const matchPrio = !prio || r['Prioridad'] === prio;
    return match && matchRes && matchPrio;
  });
  renderSolicitudesTable(filtered);
}

    ${statCard('Videoloss', '—', 'var(--warn)', 'sin señal')}
    ${statCard('DVR Apagado', '—', 'var(--accent3)', 'sin energía')}
  </div>
  <div class="dash-grid">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Registro de Incidencias</span>
        <button class="btn btn-primary" style="padding:5px 12px;font-size:11px" onclick="showPage('incidencias-new')">+ Nueva</button>
      </div>
      <div class="card-body">
        <table class="data-table" id="inc-table">
          <thead><tr><th>Folio</th><th>Fecha</th><th>Unidad</th><th>Tipo Falla</th><th>Criticidad</th><th>Detectado Por</th></tr></thead>
          <tbody id="inc-tbody"><tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text3)">Cargando…</td></tr></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Por Tipo de Falla</span></div>
      <div id="inc-chart" class="chart-bar"><p style="font-size:12px;color:var(--text3);text-align:center;padding:20px">Sin datos</p></div>
    </div>
  </div>`;
}

async function loadIncidencias() {
  const data = await apiCall('getIncidencias', { filters: {} });
  if (!data || !Array.isArray(data)) return;
  const nums = document.querySelectorAll('#inc-stats .stat-num');
  if (nums[0]) nums[0].textContent = data.length;
  if (nums[1]) nums[1].textContent = data.filter(r => r['Criticidad'] === 'Alta').length;
  if (nums[2]) nums[2].textContent = data.filter(r => r['Tipo Falla'] === 'Videoloss').length;
  if (nums[3]) nums[3].textContent = data.filter(r => r['Tipo Falla'] === 'DVR apagado').length;
  const tbody = document.getElementById('inc-tbody');
  if (tbody) {
    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text3)">Sin incidencias registradas</td></tr>`;
    } else {
      tbody.innerHTML = data.slice().reverse().map(r => `<tr>
        <td class="folio-cell">${r['Folio Incidencia'] || '—'}</td>
        <td style="font-size:11px;font-family:var(--mono)">${r['Fecha'] || '—'}</td>
        <td>${r['Unidad'] || '—'}</td>
        <td>${r['Tipo Falla'] || '—'}</td>
        <td>${criticidadBadge(r['Criticidad'])}</td>
        <td>${r['Detectado Por'] || '—'}</td>
      </tr>`).join('');
    }
  }
  const fallas = {};
  data.forEach(r => { const f = r['Tipo Falla']; fallas[f] = (fallas[f] || 0) + 1; });
  renderBarChart('inc-chart', fallas, 'var(--accent3)');
}

// ============================================================
// BADGES & HELPERS
// ============================================================
function prioBadge(p) {
  const m = { 'Crítica': 'danger', 'Alta': 'danger', 'Media': 'warning', 'Baja': 'success' };
  return `<span class="badge badge-${m[p] || 'neutral'}">${p || '—'}</span>`;
}
function resultBadge(r) {
  const m = { 'Recuperado': 'success', 'Parcial': 'warning', 'Sin video': 'danger', 'Con incidencia técnica': 'orange', 'Sobreescritura': 'danger', 'Pendiente': 'neutral' };
  return `<span class="badge badge-${m[r] || 'neutral'}">${r || '—'}</span>`;
}
function criticidadBadge(c) {
  const m = { 'Alta': 'danger', 'Media': 'warning', 'Baja': 'success' };
  return `<span class="badge badge-${m[c] || 'neutral'}">${c || '—'}</span>`;
}

async function refreshData() {
  if (STATE.currentPage === 'dashboard') loadDashboard();
  else if (STATE.currentPage === 'solicitudes-list') loadSolicitudes();
  else toast('Datos actualizados', 'success');
}
