<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Control GED</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #1a1e28;
  --border: #2a2f3d;
  --accent: #00d4aa;
  --accent2: #0099ff;
  --text1: #f0f2f7;
  --text2: #a8b0c4;
  --text3: #606880;
  --danger: #ef4444;
  --mono: 'IBM Plex Mono', monospace;
  --head: 'Syne', sans-serif;
  --body: 'Inter', sans-serif;
  --radius: 8px;
  --radius-lg: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text1);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.login-container {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 30px;
}
.logo-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--head);
  font-weight: 800;
  font-size: 18px;
  color: #000;
}
.logo-text { font-family: var(--head); font-size: 20px; font-weight: 700; color: var(--text1); }
.form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text2); font-family: var(--mono); }
.form-control {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text1);
  font-family: var(--body);
  font-size: 14px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
.form-control:focus { border-color: var(--accent); }
.btn-primary {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--accent); color: #000; border: 1px solid var(--accent);
  padding: 12px 20px; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.15s; width: 100%;
}
.btn-primary:hover { background: #00b894; }
.btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
.error-msg {
  color: var(--danger);
  font-size: 12px;
  margin-top: 10px;
  text-align: center;
  display: none;
}
</style>
</head>
<body>
<div class="login-container">
  <div class="logo">
    <div class="logo-icon">GED</div>
    <div class="logo-text">Control GED</div>
  </div>
  <form id="login-form">
    <div class="form-group">
      <label class="form-label">Clave de Usuario</label>
      <input type="text" id="clave" class="form-control" placeholder="Ingrese su clave" required>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" id="password" class="form-control" placeholder="Ingrese su contraseña" required>
    </div>
    <button type="submit" class="btn-primary" id="login-btn">Iniciar Sesión</button>
    <div class="error-msg" id="error-msg"></div>
  </form>
</div>
<script>
const USERS_API_URL = 'https://script.google.com/macros/s/AKfycbzt059aIGqjtv5s5oIDksB2LliIwtl9HqWfz-XF5M13e1XYStSfdQQ-xjpGbdlrW6s5/exec';

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errorMsg = document.getElementById('error-msg');
  const clave = document.getElementById('clave').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Verificando...';
  errorMsg.style.display = 'none';

  try {
    const url = new URL(USERS_API_URL);
    url.searchParams.set('accion', 'login');
    url.searchParams.set('clave', clave);
    url.searchParams.set('password', password);
    
    const res = await fetch(url.toString());
    const data = await res.json();

    if (data.ok) {
      const allowedRoles = ['auxiliar', 'auxiliares', 'coordinador', 'coordinadores', 'jefe'];
      const userRole = String(data.rol || '').trim().toLowerCase();
      
      if (!allowedRoles.includes(userRole)) {
         errorMsg.textContent = 'Acceso denegado. Rol no autorizado.';
         errorMsg.style.display = 'block';
      } else {
        sessionStorage.setItem('loggedUser', JSON.stringify({
           clave: data.clave || '',
           nombre: data.nombre || '',
           rol: data.rol || '',
           base: data.base || ''
        }));
        window.location.href = 'index.html';
      }
    } else {
      errorMsg.textContent = data.error || 'Credenciales incorrectas.';
      errorMsg.style.display = 'block';
    }
  } catch (err) {
    errorMsg.textContent = 'Error de conexión. Intente nuevamente.';
    errorMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Iniciar Sesión';
  }
});

// Check if already logged in
if (sessionStorage.getItem('loggedUser')) {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
