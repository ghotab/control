<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Turnos — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --border: rgba(255,255,255,0.07);
    --text: #e8ecf4;
    --muted: #5a6478;
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.15);
    --green: #22c55e;
    --accent: #6366f1;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glow blobs */
  .glow-1 {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
    top: -150px; left: -150px;
    pointer-events: none;
  }
  .glow-2 {
    position: fixed;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    pointer-events: none;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }

  .brand-icon {
    width: 44px; height: 44px;
    background: var(--blue);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .brand-text h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .brand-text p {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .form-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .form-subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 15px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
  }

  .field input:focus {
    border-color: var(--blue);
    background: var(--blue-dim);
  }

  .field input::placeholder { color: var(--muted); }

  .error-msg {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #f87171;
    margin-bottom: 20px;
  }

  .error-msg.show { display: flex; align-items: center; gap: 8px; }

  .btn-login {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
    margin-top: 4px;
  }

  .btn-login:hover { background: #2563eb; }
  .btn-login:active { transform: scale(0.99); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-login .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 28px;
    font-family: 'Space Mono', monospace;
  }

  @media (max-width: 480px) {
    .login-card { padding: 36px 24px; margin: 16px; }
  }
</style>
</head>
<body>
<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon">📅</div>
    <div class="brand-text">
      <h1>Gestión de Turnos</h1>
      <p>SISTEMA OPERATIVO</p>
    </div>
  </div>

  <h2 class="form-title">Iniciar sesión</h2>
  <p class="form-subtitle">Ingresa tus credenciales para continuar</p>

  <div class="error-msg" id="errorMsg">
    <span>⚠</span>
    <span id="errorText">Credenciales incorrectas. Intenta de nuevo.</span>
  </div>

  <div class="field">
    <label for="clave">Clave de acceso</label>
    <input type="text" id="clave" placeholder="Ej. 1005309" autocomplete="username">
  </div>

  <div class="field">
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" id="btnLogin" onclick="doLogin()">
    <span class="btn-text">Entrar al sistema</span>
    <div class="spinner"></div>
  </button>

  <p class="footer-note">© 2026 Gestión de Turnos — Acceso restringido</p>
</div>

<script>
const API_BASE = 'https://script.google.com/macros/s/AKfycbzt059aIGqjtv5s5oIDksB2LliIwtl9HqWfz-XF5M13e1XYStSfdQQ-xjpGbdlrW6s5/exec';

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// Redirect if already logged in
const session = JSON.parse(localStorage.getItem('turnos_session') || 'null');
if (session) redirectByRole(session.rol);

async function doLogin() {
  const clave = document.getElementById('clave').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn = document.getElementById('btnLogin');
  const errorMsg = document.getElementById('errorMsg');

  if (!clave || !password) {
    showError('Por favor completa todos los campos.');
    return;
  }

  errorMsg.classList.remove('show');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const url = `${API_BASE}?accion=login&clave=${encodeURIComponent(clave)}&password=${encodeURIComponent(password)}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('turnos_session', JSON.stringify({
        clave: data.clave,
        nombre: data.nombre,
        rol: data.rol,
        base: data.base
      }));
      redirectByRole(data.rol);
    } else {
      showError(data.mensaje || 'Credenciales incorrectas.');
    }
  } catch (err) {
    showError('Error de conexión. Verifica tu red e intenta de nuevo.');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorMsg').classList.add('show');
}

function redirectByRole(rol) {
  if (rol === 'jefe') {
    window.location.href = 'index.html?view=admin';
  } else {
    window.location.href = 'index.html';
  }
}
</script>
</body>
</html>
